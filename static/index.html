<title>Twitch Points Dashboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f13; color: #efeff1; min-height: 100vh; padding: 24px; }

  .subtitle { font-size: 13px; color: #adadb8; margin-bottom: 20px; }
  .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
  .stats { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; }
  .stat { background: #1f1f23; border: 0.5px solid #2a2a35; border-radius: 8px; padding: 10px 16px; }
  .stat-label { font-size: 11px; color: #adadb8; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 2px; }
  .stat-value { font-size: 20px; font-weight: 600; color: #fff; }
  .controls { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .refresh-btn { background: #9147ff; border: none; color: #fff; padding: 8px 16px; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; }
  .refresh-btn:hover { background: #772ce8; }
  .refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .timer { font-size: 12px; color: #adadb8; }
  .search { background: #1f1f23; border: 0.5px solid #2a2a35; color: #efeff1; padding: 8px 12px; border-radius: 6px; font-size: 13px; width: 200px; outline: none; }
  .search::placeholder { color: #5a5a6e; }
  table { width: 100%; border-collapse: collapse; background: #1f1f23; border-radius: 10px; overflow: hidden; border: 0.5px solid #2a2a35; }
  thead { background: #18181b; }
  th { text-align: left; padding: 10px 16px; font-size: 11px; font-weight: 600; color: #adadb8; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 0.5px solid #2a2a35; }
  th.sortable { cursor: pointer; user-select: none; }
  th.sortable:hover { color: #efeff1; }
  td { padding: 10px 16px; font-size: 13px; border-bottom: 0.5px solid #18181b; vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #26262c; }
  .twitch-name { font-weight: 500; color: #efeff1; }
  .twitch-link { color: #9147ff; text-decoration: none; font-size: 11px; }
  .twitch-link:hover { text-decoration: underline; }
  .points { font-weight: 600; font-size: 14px; color: #fff; font-variant-numeric: tabular-nums; }
  .points.loading { color: #5a5a6e; font-weight: 400; font-size: 12px; }
  .points.error { color: #eb0400; font-weight: 400; font-size: 12px; }
  .badge { display: inline-block; font-size: 10px; padding: 2px 7px; border-radius: 4px; font-weight: 500; }
  .badge-running { background: #0f6e56; color: #e1f5ee; }
  .badge-unknown { background: #2a2a35; color: #5a5a6e; }
  .streamer-cell { font-size: 11px; color: #adadb8; }
  .render-email { font-size: 11px; color: #5a5a6e; }
  .account-row td { background: #18181b; }
  .account-row:hover td { background: #20202a; }
  .channel-row td { padding-top: 8px; padding-bottom: 8px; }
  .channel-name { color: #adadb8; font-size: 13px; padding-left: 18px; position: relative; }
  .channel-name::before { content: '↳'; position: absolute; left: 0; color: #4a4a5e; }
  .channel-row:last-of-type td { border-bottom: 0.5px solid #2a2a35; }
  .spin { display: inline-block; animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .progress-bar { height: 2px; background: #2a2a35; border-radius: 1px; margin-bottom: 16px; overflow: hidden; }
  .progress-fill { height: 100%; background: #9147ff; border-radius: 1px; transition: width 1s linear; }
  .num { color: #5a5a6e; font-size: 11px; }
  .status-bar { background: #1f1f23; border: 0.5px solid #2a2a35; border-radius: 8px; padding: 10px 16px; margin-bottom: 16px; font-size: 12px; color: #adadb8; }
  .status-bar.error { border-color: #eb0400; color: #eb0400; }
  .status-bar.ok { border-color: #0f6e56; color: #57e5b4; }

  <div class="stat"><div class="stat-label">Last updated</div><div class="stat-value" id="lastUpdated" style="font-size:14px">—</div></div>

let pointsData = {};
let serviceIds = {};
let sortAsc = false;
let countdown = 600;
let countdownInterval = null;

function setStatus(msg, type) {
  const el = document.getElementById('statusBar');
  el.textContent = msg;
  el.className = 'status-bar' + (type ? ' ' + type : '');
}

async function discoverServices() {
  try {
    const r = await fetch('/api/services');
    const data = await r.json();
    data.forEach(svc => {
      serviceIds[svc.name.toLowerCase()] = { id: svc.id, ownerId: svc.ownerId };
    });
    document.getElementById('servicesFound').textContent = data.length;
    setStatus('Connected — found ' + data.length + ' services across all Render accounts.', 'ok');
    return true;
  } catch(e) {
    setStatus('Failed to connect to Render API: ' + e.message, 'error');
    return false;
  }
}

// Scans a service's logs for lines containing the Streamer repr that
// Twitch-Channel-Points-Miner-v2 logs, e.g.:
//   Streamer(username=imshayph, channel_id=157937392, channel_points=934)
// channel_points can also appear abbreviated, e.g. "2.52k" for 2520.
// No fixed list of expected usernames - whatever shows up in the logs gets picked up.
async function extractChannelsFromLogs(serviceId, ownerId) {
  const channels = {}; // lowercased username -> { name, points }
  try {
    const r = await fetch('/api/logs/' + serviceId + '?ownerId=' + encodeURIComponent(ownerId));
    const logs = await r.json();
    const entries = Array.isArray(logs) ? logs : (logs.logs || []);
    const pattern = /Streamer\(username=([a-zA-Z0-9_]+),\s*channel_id=(\d+),\s*channel_points=([\d.,]+)(k)?\)/g;
    // Walk newest -> oldest so the first match we see per username is its latest value.
    for (let i = entries.length - 1; i >= 0; i--) {
      const line = entries[i].message || entries[i].text || entries[i].log || '';
      let m;
      pattern.lastIndex = 0;
      while ((m = pattern.exec(line)) !== null) {
        const username = m[1];
        const key = username.toLowerCase();
        if (key in channels) continue;
        let pts = parseFloat(m[3].replace(/,/g, ''));
        if (isNaN(pts)) continue;
        if (m[4]) pts = pts * 1000; // "2.52k" -> 2520
        const displayName = username.charAt(0).toUpperCase() + username.slice(1);
        channels[key] = { name: displayName, points: Math.round(pts) };
      }
    }
  } catch(e) {
    // leave channels empty - rendered as "no channel data found yet"
  }
  return channels;
}

async function refreshAll() {
  const btn = document.getElementById('refreshBtn');
  const icon = document.getElementById('refreshIcon');
  btn.disabled = true;
  icon.classList.add('spin');

  if (Object.keys(serviceIds).length === 0) {
    const ok = await discoverServices();
    if (!ok) { btn.disabled = false; icon.classList.remove('spin'); return; }
  }

  const BATCH = 5;
  for (let i = 0; i < ACCOUNTS.length; i += BATCH) {
    const batch = ACCOUNTS.slice(i, i + BATCH);
    await Promise.all(batch.map(async (a) => {
      const svcInfo = serviceIds[a.twitch.toLowerCase()];
      if (!svcInfo) {
        pointsData[a.twitch] = { channels: {}, notFound: true };
        return;
      }
      const channels = await extractChannelsFromLogs(svcInfo.id, svcInfo.ownerId);
      pointsData[a.twitch] = { channels };
    }));
    renderTable();
  }

  updateStats();
  document.getElementById('lastUpdated').textContent = new Date().toLocaleTimeString();
  btn.disabled = false;
  icon.classList.remove('spin');
  resetCountdown();
}

function renderTable() {
  const search = document.getElementById('search').value.toLowerCase();
  const rows = ACCOUNTS.filter(a => {
    const info = pointsData[a.twitch];
    const channelNames = info && info.channels ? Object.values(info.channels).map(c => c.name.toLowerCase()) : [];
    return a.twitch.toLowerCase().includes(search) ||
           a.render.toLowerCase().includes(search) ||
           channelNames.some(n => n.includes(search));
  });
  document.getElementById('totalAccounts').textContent = rows.length;

  let html = '';
  rows.forEach((a, i) => {
    const info = pointsData[a.twitch];
    let statusBadge;
    if (!info) {
      statusBadge = '<span class="badge badge-unknown">—</span>';
    } else if (info.notFound) {
      statusBadge = '<span class="badge badge-unknown">—</span>';
    } else {
      statusBadge = '<span class="badge badge-running">running</span>';
    }

    html += '<tr class="account-row">' +
      '<td class="num">' + (i + 1) + '</td>' +
      '<td><div class="twitch-name">' + a.twitch + '</div>' +
        '<a class="twitch-link" href="https://twitch.tv/' + a.twitch + '" target="_blank">twitch.tv/' + a.twitch + '</a></td>' +
      '<td class="render-email">' + a.render + '</td>' +
      '<td></td>' +
      '<td>' + statusBadge + '</td>' +
      '</tr>';

    if (!info) {
      html += '<tr class="channel-row"><td></td><td class="channel-name">fetching...</td><td></td><td></td><td></td></tr>';
    } else if (info.notFound) {
      html += '<tr class="channel-row"><td></td><td class="channel-name points error">service not found</td><td></td><td></td><td></td></tr>';
    } else {
      const channelList = Object.values(info.channels).sort((x, y) => y.points - x.points);
      if (channelList.length === 0) {
        html += '<tr class="channel-row"><td></td><td class="channel-name points loading">no channel data found yet</td><td></td><td></td><td></td></tr>';
      } else {
        channelList.forEach(ch => {
          html += '<tr class="channel-row">' +
            '<td></td>' +
            '<td class="channel-name">' + ch.name + '</td>' +
            '<td></td>' +
            '<td><span class="points">' + ch.points.toLocaleString() + '</span></td>' +
            '<td></td>' +
            '</tr>';
        });
      }
    }
  });

  document.getElementById('tableBody').innerHTML = html;
}

function accountTotal(twitch) {
  const info = pointsData[twitch];
  if (!info || !info.channels) return 0;
  return Object.values(info.channels).reduce((s, c) => s + c.points, 0);
}

function updateStats() {
  let total = 0;
  Object.values(pointsData).forEach(info => {
    if (info && info.channels) {
      Object.values(info.channels).forEach(c => { total += c.points; });
    }
  });
  document.getElementById('totalPoints').textContent = total ? total.toLocaleString() : '—';
}

function sortByPoints() {
  sortAsc = !sortAsc;
  ACCOUNTS.sort((a, b) => {
    const pa = accountTotal(a.twitch);
    const pb = accountTotal(b.twitch);
    return sortAsc ? pa - pb : pb - pa;
  });
  renderTable();
}

function resetCountdown() {
  countdown = 600;
  clearInterval(countdownInterval);
  const fill = document.getElementById('progressFill');
  countdownInterval = setInterval(() => {
    countdown--;
    const m = Math.floor(countdown / 60);
    const s = String(countdown % 60).padStart(2, '0');
    document.getElementById('timer').textContent = 'Next refresh in ' + m + ':' + s;
    fill.style.width = Math.round(countdown / 600 * 100) + '%';
    if (countdown <= 0) { clearInterval(countdownInterval); refreshAll(); }
  }, 1000);
}

renderTable();
resetCountdown();
discoverServices().then(() => refreshAll());
