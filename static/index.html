<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Twitch Points Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #08080d;
    --surface:   #111118;
    --surface2:  #18181f;
    --border:    #222230;
    --border2:   #2e2e40;
    --purple:    #9147ff;
    --purple-dim:#6a32c0;
    --green:     #00e5a0;
    --text:      #efeff1;
    --muted:     #6e6e85;
    --muted2:    #9898b0;
    --mono:      'JetBrains Mono', monospace;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 32px 24px;
  }

  /* ---- HEADER ---- */
  header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 32px;
  }

  .logo {
    width: 36px; height: 36px;
    background: var(--purple);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .logo svg { width: 20px; height: 20px; fill: white; }

  header h1 {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }

  header .sub {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }

  .live-dot {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--muted2);
    font-weight: 500;
  }

  .live-dot span {
    width: 7px; height: 7px;
    background: var(--green);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* ---- STREAMER PILLS ---- */
  .streamers-section {
    margin-bottom: 28px;
  }

  .section-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .streamer-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .streamer-pill {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    transition: border-color 0.15s;
  }

  .streamer-pill:hover { border-color: var(--purple-dim); }

  .pill-avatar {
    width: 24px; height: 24px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--purple-dim), var(--purple));
    display: flex; align-items: center; justify-content: center;
    font-size: 10px;
    font-weight: 700;
    color: white;
    flex-shrink: 0;
  }

  .pill-name {
    font-size: 12px;
    font-weight: 500;
    color: var(--text);
  }

  .pill-points {
    font-size: 12px;
    font-family: var(--mono);
    font-weight: 600;
    color: var(--purple);
  }

  /* ---- SEARCH ---- */
  .toolbar {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
    align-items: center;
  }

  .search-wrap {
    position: relative;
    flex: 1;
    max-width: 280px;
  }

  .search-wrap svg {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    width: 14px; height: 14px;
    fill: var(--muted);
    pointer-events: none;
  }

  input.search {
    width: 100%;
    padding: 8px 10px 8px 30px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text);
    font-size: 13px;
    font-family: 'Inter', sans-serif;
    outline: none;
    transition: border-color 0.15s;
  }

  input.search:focus { border-color: var(--purple-dim); }
  input.search::placeholder { color: var(--muted); }

  .refresh-label {
    font-size: 11px;
    color: var(--muted);
    margin-left: auto;
  }

  /* ---- TABLE ---- */
  .table-wrap {
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  thead tr {
    background: var(--surface2);
  }

  th {
    padding: 10px 16px;
    text-align: left;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
  }

  td {
    padding: 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    vertical-align: top;
  }

  tr:last-child td { border-bottom: none; }

  /* account row */
  .account-cell {
    padding: 12px 16px;
    vertical-align: middle;
  }

  .account-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    font-family: var(--mono);
  }

  .account-total {
    font-size: 11px;
    color: var(--muted2);
    margin-top: 2px;
  }

  /* channels cell */
  .channels-cell {
    padding: 10px 16px;
  }

  .channel-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 4px 0;
    gap: 16px;
  }

  .channel-row + .channel-row {
    border-top: 1px solid var(--border);
  }

  .channel-name {
    font-size: 12px;
    color: var(--muted2);
    font-weight: 500;
  }

  .channel-pts {
    font-size: 12px;
    font-family: var(--mono);
    font-weight: 600;
    color: var(--green);
    white-space: nowrap;
  }

  .no-channels {
    font-size: 12px;
    color: var(--muted);
    padding: 8px 0;
  }

  /* status */
  .status-cell {
    padding: 12px 16px;
    vertical-align: middle;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.03em;
  }

  .badge.live {
    background: rgba(0, 229, 160, 0.12);
    color: var(--green);
    border: 1px solid rgba(0, 229, 160, 0.25);
  }

  .badge.live::before {
    content: '';
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--green);
  }

  .badge.offline {
    background: var(--surface2);
    color: var(--muted);
    border: 1px solid var(--border);
  }

  /* empty */
  .empty-row td {
    padding: 40px 16px;
    text-align: center;
    color: var(--muted);
    font-size: 13px;
  }

  /* account row highlight on hover */
  tbody tr:hover td { background: rgba(145, 71, 255, 0.03); }
</style>
</head>

<body>

<header>
  <div class="logo">
    <svg viewBox="0 0 20 20"><path d="M2 2h16v10H11l-3 3v-3H2V2zm5 4h2v4H7V6zm5 0h2v4h-2V6z"/></svg>
  </div>
  <div>
    <h1>Points Tracker</h1>
    <div class="sub">Twitch channel points miner</div>
  </div>
  <div class="live-dot"><span></span>auto-refreshing</div>
</header>

<!-- STREAMER TOTALS AT TOP -->
<div class="streamers-section">
  <div class="section-label">Points by Streamer</div>
  <div class="streamer-pills" id="streamerPills">
    <div class="streamer-pill"><div class="pill-name" style="color:var(--muted)">Waiting for data…</div></div>
  </div>
</div>

<!-- TABLE -->
<div class="toolbar">
  <div class="search-wrap">
    <svg viewBox="0 0 20 20"><path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd"/></svg>
    <input class="search" id="search" placeholder="Search account…" oninput="render()" />
  </div>
  <div class="refresh-label" id="refreshLabel">—</div>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th style="width:200px">Account</th>
        <th>Channels &amp; Points</th>
        <th style="width:80px">Status</th>
      </tr>
    </thead>
    <tbody id="body">
      <tr class="empty-row"><td colspan="3">Loading…</td></tr>
    </tbody>
  </table>
</div>

<script>
let pointsData = {};

function fmt(n) {
  if (n >= 1000) return (n / 1000).toFixed(1).replace(/\.0$/, '') + 'k';
  return n.toLocaleString();
}

function initials(name) {
  return name.slice(0, 2).toUpperCase();
}

async function load() {
  try {
    const res = await fetch("/api/points");
    const data = await res.json();
    pointsData = data;
    render();
    const now = new Date();
    document.getElementById("refreshLabel").textContent =
      `Updated ${now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'})}`;
  } catch (e) {
    console.log("fetch error", e);
  }
}

function render() {
  const search = document.getElementById("search").value.toLowerCase();
  const body = document.getElementById("body");
  const pills = document.getElementById("streamerPills");

  // --- Aggregate totals per streamer across ALL accounts ---
  const streamerTotals = {};
  Object.values(pointsData).forEach(info => {
    Object.entries(info.channels || {}).forEach(([ch, pts]) => {
      streamerTotals[ch] = (streamerTotals[ch] || 0) + pts;
    });
  });

  // Render pills
  const sorted = Object.entries(streamerTotals).sort((a, b) => b[1] - a[1]);
  if (sorted.length === 0) {
    pills.innerHTML = `<div class="streamer-pill"><div class="pill-name" style="color:var(--muted)">No data yet</div></div>`;
  } else {
    pills.innerHTML = sorted.map(([name, pts]) => `
      <div class="streamer-pill">
        <div class="pill-avatar">${initials(name)}</div>
        <div class="pill-name">${name}</div>
        <div class="pill-points">${fmt(pts)}</div>
      </div>
    `).join('');
  }

  // --- Render table rows ---
  const entries = Object.entries(pointsData).filter(([acc]) =>
    acc.toLowerCase().includes(search)
  );

  if (entries.length === 0) {
    body.innerHTML = `<tr class="empty-row"><td colspan="3">No accounts found</td></tr>`;
    return;
  }

  body.innerHTML = entries.map(([account, info]) => {
    const channels = Object.entries(info.channels || {}).sort((a, b) => b[1] - a[1]);
    const total = channels.reduce((s, [, p]) => s + p, 0);
    const now = Date.now() / 1000;
    const age = info.updated ? now - info.updated : 9999;
    const isLive = age < 180; // stale after 3 min

    const channelHTML = channels.length === 0
      ? `<div class="no-channels">No channels tracked yet</div>`
      : channels.map(([name, pts]) => `
          <div class="channel-row">
            <span class="channel-name">${name}</span>
            <span class="channel-pts">${fmt(pts)}</span>
          </div>
        `).join('');

    return `
      <tr>
        <td class="account-cell">
          <div class="account-name">${account}</div>
          <div class="account-total">${fmt(total)} total pts</div>
        </td>
        <td class="channels-cell">${channelHTML}</td>
        <td class="status-cell">
          <span class="badge ${isLive ? 'live' : 'offline'}">${isLive ? 'LIVE' : 'IDLE'}</span>
        </td>
      </tr>
    `;
  }).join('');
}

load();
setInterval(load, 5000);
</script>

</body>
</html>
