<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Twitch Points Dashboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f13; color: #efeff1; min-height: 100vh; padding: 24px; }
  h1 { font-size: 20px; font-weight: 600; color: #fff; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #adadb8; margin-bottom: 20px; }
  .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
  .stats { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; }
  .stat { background: #1f1f23; border: 0.5px solid #2a2a35; border-radius: 8px; padding: 10px 16px; }
  .stat-label { font-size: 11px; color: #adadb8; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 2px; }
  .stat-value { font-size: 20px; font-weight: 600; color: #fff; }
  .controls { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .refresh-btn { background: #9147ff; border: none; color: #fff; padding: 8px 16px; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; }
  .refresh-btn:hover { background: #772ce8; }
  .refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .timer { font-size: 12px; color: #adadb8; }
  .search { background: #1f1f23; border: 0.5px solid #2a2a35; color: #efeff1; padding: 8px 12px; border-radius: 6px; font-size: 13px; width: 200px; outline: none; }
  .search::placeholder { color: #5a5a6e; }
  .spin { display: inline-block; animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .progress-bar { height: 2px; background: #2a2a35; border-radius: 1px; margin-bottom: 16px; overflow: hidden; }
  .progress-fill { height: 100%; background: #9147ff; border-radius: 1px; transition: width 1s linear; }
  .status-bar { background: #1f1f23; border: 0.5px solid #2a2a35; border-radius: 8px; padding: 10px 16px; margin-bottom: 16px; font-size: 12px; color: #adadb8; }
  .status-bar.error { border-color: #eb0400; color: #eb0400; }
  .status-bar.ok { border-color: #0f6e56; color: #57e5b4; }
  .num { color: #5a5a6e; font-size: 11px; }

  /* Account cards */
  .accounts-grid { display: flex; flex-direction: column; gap: 16px; }
  .account-card { background: #1f1f23; border: 0.5px solid #2a2a35; border-radius: 10px; overflow: hidden; }
  .account-header { background: #18181b; padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 0.5px solid #2a2a35; }
  .account-name { font-weight: 600; font-size: 14px; color: #efeff1; }
  .account-email { font-size: 11px; color: #5a5a6e; margin-top: 2px; }
  .account-total { font-size: 12px; color: #adadb8; }
  .account-total span { color: #9147ff; font-weight: 600; }
  .streamers-table { width: 100%; border-collapse: collapse; }
  .streamers-table td { padding: 8px 16px; font-size: 13px; border-bottom: 0.5px solid #18181b; }
  .streamers-table tr:last-child td { border-bottom: none; }
  .streamers-table tr:hover td { background: #26262c; }
  .streamer-name { color: #9147ff; font-weight: 500; }
  .streamer-name a { color: #9147ff; text-decoration: none; }
  .streamer-name a:hover { text-decoration: underline; }
  .pts { font-weight: 600; color: #fff; font-variant-numeric: tabular-nums; }
  .pts.loading { color: #5a5a6e; font-weight: 400; font-size: 12px; }
  .pts.none { color: #5a5a6e; font-weight: 400; font-size: 12px; }
  .badge { display: inline-block; font-size: 10px; padding: 2px 7px; border-radius: 4px; font-weight: 500; }
  .badge-running { background: #0f6e56; color: #e1f5ee; }
  .badge-error { background: #3a1010; color: #eb0400; }
  .hidden { display: none; }
</style>
</head>
<body>

<div class="top-bar">
  <div>
    <h1>Twitch Points Dashboard</h1>
    <div class="subtitle">All accounts — auto-refreshes every 10 minutes</div>
  </div>
  <div class="controls">
    <input class="search" type="text" id="search" placeholder="Search accounts..." oninput="filterCards()">
    <span class="timer" id="timer">Next refresh in 10:00</span>
    <button class="refresh-btn" id="refreshBtn" onclick="refreshAll()">
      <span id="refreshIcon">&#8635;</span> Refresh all
    </button>
  </div>
</div>

<div class="stats">
  <div class="stat"><div class="stat-label">Accounts</div><div class="stat-value" id="statAccounts">—</div></div>
  <div class="stat"><div class="stat-label">Total points</div><div class="stat-value" id="statTotal">—</div></div>
  <div class="stat"><div class="stat-label">Services found</div><div class="stat-value" id="statServices">—</div></div>
  <div class="stat"><div class="stat-label">Last updated</div><div class="stat-value" id="statUpdated" style="font-size:14px">—</div></div>
</div>

<div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:100%"></div></div>
<div class="status-bar" id="statusBar">Connecting to Render...</div>

<div class="accounts-grid" id="accountsGrid"></div>

<script>
// accountsData: twitch username -> { email, streamers: { streamerName -> points } }
let accountsData = {};
let serviceIds = {};
let countdown = 600;
let countdownInterval = null;

function setStatus(msg, type) {
  const el = document.getElementById('statusBar');
  el.textContent = msg;
  el.className = 'status-bar' + (type ? ' ' + type : '');
}

async function discoverServices() {
  try {
    const r = await fetch('/api/services');
    const data = await r.json();
    data.forEach(svc => { serviceIds[svc.name.toLowerCase()] = svc.id; });
    document.getElementById('statServices').textContent = data.length;
    setStatus('Connected — found ' + data.length + ' services.', 'ok');
    return true;
  } catch(e) {
    setStatus('Failed to connect: ' + e.message, 'error');
    return false;
  }
}

function parsePoints(val, suffix) {
  let n = parseFloat(val);
  const s = (suffix || '').toLowerCase();
  if (s === 'k') n = Math.round(n * 1000);
  else if (s === 'm') n = Math.round(n * 1000000);
  else n = Math.round(n);
  return n;
}

async function fetchServiceData(serviceId) {
  // Returns { twitchUser, email, streamers: { name -> points } } or null
  try {
    const r = await fetch('/api/logs/' + serviceId);
    const logs = await r.json();
    const entries = Array.isArray(logs) ? logs : (logs.logs || []);

    // Parse all lines, build per-streamer latest points
    // Log format: channel_points=4.31k) ... username=imshayph
    const streamerPoints = {};
    for (const entry of entries) {
      const line = entry.message || entry.text || entry.log || '';
      // Match: username=xxx, channel_points=yyy
      const um = line.match(/username=([a-zA-Z0-9_]+)/);
      const pm = line.match(/channel_points=([\d.]+)([km]?)/i);
      if (um && pm) {
        const streamer = um[1].toLowerCase();
        const pts = parsePoints(pm[1], pm[2]);
        if (pts > 0) streamerPoints[streamer] = pts; // keep latest (last wins as we go forward)
      }
    }
    return streamerPoints;
  } catch(e) {
    return null;
  }
}

async function refreshAll() {
  const btn = document.getElementById('refreshBtn');
  const icon = document.getElementById('refreshIcon');
  btn.disabled = true;
  icon.classList.add('spin');

  if (Object.keys(serviceIds).length === 0) {
    const ok = await discoverServices();
    if (!ok) { btn.disabled = false; icon.classList.remove('spin'); return; }
  }

  const serviceNames = Object.keys(serviceIds);
  const BATCH = 5;

  for (let i = 0; i < serviceNames.length; i += BATCH) {
    const batch = serviceNames.slice(i, i + BATCH);
    await Promise.all(batch.map(async (name) => {
      const id = serviceIds[name];
      const streamerPoints = await fetchServiceData(id);
      if (!accountsData[name]) accountsData[name] = { streamers: {}, notFound: false };
      if (streamerPoints === null) {
        accountsData[name].error = true;
      } else {
        accountsData[name].streamers = streamerPoints;
        accountsData[name].error = false;
      }
    }));
    renderCards();
  }

  updateStats();
  document.getElementById('statUpdated').textContent = new Date().toLocaleTimeString();
  btn.disabled = false;
  icon.classList.remove('spin');
  resetCountdown();
}

function renderCards() {
  const search = document.getElementById('search').value.toLowerCase();
  const grid = document.getElementById('accountsGrid');
  const names = Object.keys(accountsData).sort();

  grid.innerHTML = names.map(name => {
    if (search && !name.includes(search)) return '';
    const acct = accountsData[name];
    const streamers = acct.streamers || {};
    const streamerNames = Object.keys(streamers).sort();
    const total = Object.values(streamers).reduce((s, v) => s + v, 0);

    const rows = streamerNames.length === 0
      ? '<tr><td colspan="2" class="pts none">' + (acct.error ? 'error fetching logs' : 'no data yet') + '</td></tr>'
      : streamerNames.map(s => `
          <tr>
            <td class="streamer-name"><a href="https://twitch.tv/${s}" target="_blank">${s}</a></td>
            <td class="pts">${streamers[s].toLocaleString()}</td>
          </tr>`).join('');

    return `
      <div class="account-card">
        <div class="account-header">
          <div>
            <div class="account-name">${name}</div>
          </div>
          <div class="account-total">Total: <span>${total ? total.toLocaleString() : '—'}</span></div>
        </div>
        <table class="streamers-table">${rows}</table>
      </div>`;
  }).join('');
}

function filterCards() { renderCards(); }

function updateStats() {
  const names = Object.keys(accountsData);
  document.getElementById('statAccounts').textContent = names.length;
  const grand = Object.values(accountsData).reduce((s, a) => {
    return s + Object.values(a.streamers || {}).reduce((ss, v) => ss + v, 0);
  }, 0);
  document.getElementById('statTotal').textContent = grand ? grand.toLocaleString() : '—';
}

function resetCountdown() {
  countdown = 600;
  clearInterval(countdownInterval);
  const fill = document.getElementById('progressFill');
  countdownInterval = setInterval(() => {
    countdown--;
    const m = Math.floor(countdown / 60);
    const s = String(countdown % 60).padStart(2, '0');
    document.getElementById('timer').textContent = 'Next refresh in ' + m + ':' + s;
    fill.style.width = Math.round(countdown / 600 * 100) + '%';
    if (countdown <= 0) { clearInterval(countdownInterval); refreshAll(); }
  }, 1000);
}

resetCountdown();
discoverServices().then(() => refreshAll());
</script>
</body>
</html>
