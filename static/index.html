<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Twitch Points Dashboard</title>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f13; color: #efeff1; min-height: 100vh; padding: 24px; }

  h1 { font-size: 20px; font-weight: 600; color: #fff; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #adadb8; margin-bottom: 20px; }

  .stats { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
  .stat { background: #1f1f23; padding: 10px 16px; border-radius: 8px; border: 1px solid #2a2a35; }
  .stat-label { font-size: 11px; color: #adadb8; }
  .stat-value { font-size: 20px; font-weight: 600; }

  .controls { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
  .search {
    padding: 8px 12px;
    border-radius: 6px;
    border: 1px solid #2a2a35;
    background: #1f1f23;
    color: white;
    width: 220px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    background: #1f1f23;
    border-radius: 10px;
    overflow: hidden;
  }

  th, td {
    padding: 10px 14px;
    border-bottom: 1px solid #2a2a35;
    font-size: 13px;
  }

  th {
    text-align: left;
    color: #adadb8;
    font-size: 11px;
  }

  tr:hover td { background: #26262c; }

  .badge {
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 11px;
  }

  .ok { background: #0f6e56; color: white; }
  .warn { background: #2a2a35; color: #adadb8; }
</style>
</head>

<body>

<h1>Twitch Points Dashboard</h1>
<div class="subtitle">Live miner data (no Render API)</div>

<div class="stats">
  <div class="stat">
    <div class="stat-label">Accounts</div>
    <div class="stat-value" id="totalAccounts">0</div>
  </div>
  <div class="stat">
    <div class="stat-label">Total Points</div>
    <div class="stat-value" id="totalPoints">0</div>
  </div>
</div>

<div class="controls">
  <input class="search" id="search" placeholder="Search..." oninput="render()" />
</div>

<table>
  <thead>
    <tr>
      <th>#</th>
      <th>Account</th>
      <th>Channel</th>
      <th>Points</th>
      <th>Status</th>
    </tr>
  </thead>
  <tbody id="body"></tbody>
</table>

<script>
const ACCOUNTS = [
  "beelzebul121212",
  "beelzebul7612",
  "avenger000000424",
  "vampireking522",
  "ryangarciafan3133",
  "discorduser0313no1",
  "CoffeeWithChris89",
  "LunarBrandon42",
  "SilentMikey16",
  "TylerRespawns33"
];

let pointsData = {};

// 🔥 LOAD FROM BACKEND
async function load() {
  try {
    const res = await fetch("/api/points");
    const data = await res.json();
    pointsData = data;
    render();
  } catch (e) {
    console.log("error", e);
  }
}

// 🔥 RENDER TABLE
function render() {
  const search = document.getElementById("search").value.toLowerCase();
  const body = document.getElementById("body");

  let html = "";
  let totalPoints = 0;
  let count = 0;

  Object.entries(pointsData).forEach(([account, info], i) => {

    if (!account.toLowerCase().includes(search)) return;

    const channels = info.channels || {};
    const entries = Object.entries(channels);

    let accountPoints = 0;

    entries.forEach(([name, pts]) => {
      accountPoints += pts;
    });

    totalPoints += accountPoints;
    count++;

    html += `
      <tr>
        <td>${i + 1}</td>
        <td>${account}</td>
        <td>${entries.map(c => c[0]).join(", ")}</td>
        <td>${accountPoints.toLocaleString()}</td>
        <td><span class="badge ok">live</span></td>
      </tr>
    `;
  });

  document.getElementById("body").innerHTML = html;
  document.getElementById("totalAccounts").innerText = count;
  document.getElementById("totalPoints").innerText = totalPoints.toLocaleString();
}

// 🔥 AUTO REFRESH
load();
setInterval(load, 5000);

</script>

</body>
</html>
